<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Управление каталогом товаров</h1>
    </header>

    <main>
        <section class="form-section">
            <h3>Добавить новый товар</h3>
            <form id="add-product-form">
                <input type="text" id="form-title" placeholder="Название товара">
                <input type="text" id="form-price" placeholder="Цена">
                <select id="form-category">
                    <option value="">Категория</option>
                    <option value="Электроника">Электроника</option>
                    <option value="Аксессуары">Аксессуары</option>
                    <option value="Бытовая техника">Бытовая техника</option>
                </select>
                <button type="submit">Сохранить</button>
                <div id="form-errors"></div>
            </form>
        </section>

        <hr>

        <section class="controls">
            <select id="filter-select">
                <option value="">Все категории</option>
                <option value="Электроника">Электроника</option>
                <option value="Аксессуары">Аксессуары</option>
                <option value="Бытовая техника">Бытовая техника</option>
            </select>
            <button id="sort-btn">Сортировать по цене</button>
        </section>

        <div id="product-list" class="grid-container"></div>

        <div id="message"></div>
    </main>

    <script src="data.js"></script>
    <script src="logic.js"></script>
    <script src="script.js"></script>
</body>
</html>
