<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1>Управление каталогом</h1>
        </header>
        
        <main class="main-content">
            <section class="lab-controls">
                <h3>Интерактивные тесты:</h3>
                <div class="buttons-group">
                    <button id="btn-input">Ввод данных</button>
                    <button id="btn-logic">Проверка условий</button>
                    <button id="btn-loop">Показать все товары</button>
                </div>
            </section>

            <section class="output-section">
                <h3>Результат выполнения:</h3>
                <div id="output-board" style="padding: 15px; border: 1px dashed #cb11ab; min-height: 50px; margin-top: 10px;"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
